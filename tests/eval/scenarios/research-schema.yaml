name: research-schema
description: Output содержит все 5 секций + правильный фронтматтер
fixture: minimal-vault
skip_opencode: true
setup_script: agent/scripts/index-tags.py && agent/scripts/generate-tags-index.py
command: wiki-research здоровье
user_response: ""

checks:
  - type: dir_content_contains
    path: agent/research
    text: topic
    description: Research output has topic in frontmatter
  - type: dir_content_contains
    path: agent/research
    text: Краткий снимок
    description: Has Краткий снимок section
  - type: dir_content_contains
    path: agent/research
    text: Ключевые находки
    description: Has Ключевые находки section
  - type: dir_content_contains
    path: agent/research
    text: Выводы
    description: Has Выводы section
  - type: dir_content_contains
    path: agent/research
    text: Источники
    description: Has Источники section
